name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npm test

  validate-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run

  wrappers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        wrapper: [react, vue]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: wrappers/${{ matrix.wrapper }}
      - run: npm run typecheck
        working-directory: wrappers/${{ matrix.wrapper }}
      - run: npm run build
        working-directory: wrappers/${{ matrix.wrapper }}
